<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solar Forecast Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIINfQqgf0ujrj8E6J5dN0P4rJZpTg5bM2M="
      crossorigin=""
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Solar Power Forecast</p>
          <h1>全国発電地点ダッシュボード</h1>
        </div>
        <div class="source-badge">地図: 国土地理院</div>
      </header>

      <main class="dashboard-grid">
        <section class="map-section" aria-label="全国地図">
          <div id="map"></div>
          <div class="legend" aria-label="凡例">
            <span class="legend-dot low"></span><span>低</span>
            <span class="legend-bar"></span>
            <span class="legend-dot high"></span><span>高</span>
            <strong>推定発電量</strong>
          </div>
        </section>

        <aside class="summary-panel" aria-label="全体サマリー">
          <div class="summary-head">
            <p class="eyebrow">Overview</p>
            <h2 id="summary-date">--</h2>
          </div>
          <div class="metric-grid">
            <div class="metric">
              <span>地点数</span>
              <strong id="metric-sites">--</strong>
            </div>
            <div class="metric">
              <span>設備容量</span>
              <strong id="metric-capacity">--</strong>
            </div>
            <div class="metric">
              <span>推定発電量</span>
              <strong id="metric-generation">--</strong>
            </div>
            <div class="metric">
              <span>最大設備利用率</span>
              <strong id="metric-capacity-factor">--</strong>
            </div>
          </div>

          <div class="rank-section">
            <div class="section-title">
              <h3>推定発電量</h3>
              <span>MWh</span>
            </div>
            <div id="bars" class="bars"></div>
          </div>

          <div class="rank-section table-wrap">
            <div class="section-title">
              <h3>地点一覧</h3>
              <span id="data-status">loading</span>
            </div>
            <table>
              <thead>
                <tr>
                  <th>地点</th>
                  <th>容量</th>
                  <th>発電量</th>
                  <th>CF</th>
                </tr>
              </thead>
              <tbody id="site-table"></tbody>
            </table>
          </div>
        </aside>
      </main>
    </div>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="./app.js"></script>
  </body>
</html>
