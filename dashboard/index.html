<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Solar Forecast Dashboard</title>
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    >
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Solar Power Forecast</p>
          <h1>全国発電地点ダッシュボード</h1>
        </div>
        <div class="source-badge">白地図: TopoJSON</div>
      </header>

      <main class="dashboard-grid">
        <section class="map-section" aria-label="全国地図">
          <div id="map"></div>
          <div class="legend" aria-label="凡例">
            <strong class="legend-heading">県別 推定発電量（円）</strong>
            <div class="legend-row">
              <span class="legend-dot low" aria-hidden="true"></span>
              <span class="legend-bar"></span>
              <span class="legend-dot high" aria-hidden="true"></span>
            </div>
            <div class="legend-scale-labels"><span>低</span><span>中</span><span>高</span></div>
            <strong class="legend-heading">個別施設 (予想発電率)</strong>
            <div class="legend-row">
              <span class="legend-facility-bar"></span>
            </div>
            <div class="legend-gti-labels"><span>0%</span><span>15%</span><span>30%+</span></div>
            <strong class="legend-heading">天気（面 / 格子・昼）</strong>
            <div class="legend-row">
              <span class="legend-weather-bar"></span>
            </div>
            <div class="legend-gti-labels"><span>晴れ</span><span>曇り</span></div>
            <div id="legend-weather-night" class="legend-weather-night" hidden>
              <strong class="legend-heading">天気（現在・夜）</strong>
              <div class="legend-row">
                <span class="legend-weather-night-bar"></span>
              </div>
              <div class="legend-gti-labels"><span>快晴</span><span>曇り</span></div>
            </div>
            <div class="legend-missing"><span class="legend-missing-swatch"></span><span>データなし</span></div>
          </div>
        </section>

        <aside class="summary-panel" aria-label="全体サマリー">
          <div class="summary-head">
            <p class="eyebrow">Overview</p>
            <h2 id="summary-date">--</h2>
          </div>
          <div class="horizon-control" role="radiogroup" aria-label="予測時間軸">
            <label><input type="radio" name="horizon" value="now"> 現在</label>
            <label><input type="radio" name="horizon" value="today" checked> 当日</label>
            <label><input type="radio" name="horizon" value="tomorrow"> 翌日</label>
          </div>
          <div class="metric-grid">
            <div class="metric">
              <span>対象施設数</span>
              <strong id="metric-sites">--</strong>
            </div>
            <div class="metric">
              <span>設備容量</span>
              <strong id="metric-capacity">--</strong>
            </div>
            <div class="metric">
              <span id="metric-generation-label">推定発電量</span>
              <strong id="metric-generation">--</strong>
            </div>
            <div class="metric">
              <span id="metric-capacity-factor-label">最大設備利用率</span>
              <strong id="metric-capacity-factor">--</strong>
            </div>
          </div>

          <div class="rank-section table-wrap">
            <div class="section-title">
              <h3 id="site-list-title">都道府県一覧</h3>
              <div class="status-stack">
                <span id="data-status">loading</span>
                <span id="forecast-status">予測取得中…</span>
                <span id="facility-status">施設予測取得中…</span>
              </div>
            </div>
            <div class="list-mode-control" role="radiogroup" aria-label="一覧種別">
              <label><input type="radio" name="list-mode" value="prefecture" checked> 都道府県</label>
              <label><input type="radio" name="list-mode" value="facility"> 施設</label>
            </div>
            <table>
              <thead id="site-table-head">
                <tr>
                  <th class="toggle-col"><input type="checkbox" id="prefs-master" checked title="全都道府県表示/全都道府県非表示"></th>
                  <th class="site-col">都道府県</th>
                  <th class="metric-col">容量</th>
                  <th class="metric-col">発電量</th>
                  <th class="metric-col">CF</th>
                </tr>
              </thead>
              <tbody id="site-table"></tbody>
            </table>
          </div>
        </aside>
      </main>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>
    <script src="./solar.js"></script>
    <script src="./colors.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
